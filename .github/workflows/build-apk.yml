name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format source
        run: dart format lib/main.dart test/widget_test.dart

      - name: Generate Android platform files
        shell: bash
        run: |
          cp lib/main.dart /tmp/vmeste_main.dart
          flutter create . \
            --platforms=android \
            --project-name=vmeste_goal \
            --org=com.vmeste
          cp /tmp/vmeste_main.dart lib/main.dart

      - name: Add speech recognition permissions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          block = '''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <queries>
                  <intent>
                      <action android:name="android.speech.RecognitionService" />
                  </intent>
              </queries>'''
          if marker in text:
              text = text.replace(marker, block, 1)
          path.write_text(text)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        continue-on-error: true
        run: flutter analyze

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build-apk.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.2.1-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.2.1-build-log
          path: build-apk.log
          if-no-files-found: warn
          retention-days: 7
