name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Apply v0.3 quick-start flow
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/rewrite_v030.py

      - name: Apply explicit lint cleanup
        run: python3 tool/fix_v030_lints.py

      - name: Fix speech options constructor
        run: python3 tool/fix_speech_options.py

      - name: Apply v0.3.1 copy fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/rewrite_v031_final.py

      - name: Apply v0.3.1 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v031_tests.py

      - name: Apply v0.3.2 simplified goal flow
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/rewrite_v032.py

      - name: Apply v0.3.2 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v032_tests.py

      - name: Remove profile onboarding step
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/rewrite_v033.py

      - name: Apply v0.3.3 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v033_tests.py

      - name: Apply v0.3.4 onboarding and action fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if grep -Eq "version: (0\.3\.4\+8|0\.4\.0\+9|0\.4\.1\+10)" pubspec.yaml; then
            echo "v0.3.4 source already applied"
          else
            python3 tool/rewrite_v034.py
          fi
          python3 tool/fix_v034_context.py

      - name: Apply v0.3.4 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v034_tests.py

      - name: Apply v0.4 intent architecture
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if grep -Eq "version: (0\.4\.0\+9|0\.4\.1\+10)" pubspec.yaml && grep -q "class IntentChooserPage" lib/main.dart; then
            echo "v0.4.0 source already applied"
          else
            python3 tool/rewrite_v040.py
          fi

      - name: Apply v0.4 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v040_tests.py

      - name: Apply v0.4.1 goal cleanup
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if grep -q "version: 0.4.1+10" pubspec.yaml && grep -q "Своя длительность в минутах" lib/main.dart; then
            echo "v0.4.1 source already applied"
          else
            python3 tool/rewrite_v041.py
          fi
          python3 tool/fix_v041_context.py

      - name: Apply v0.4.1 widget tests
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        run: python3 tool/fix_v041_tests.py

      - name: Commit v0.4.1 source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if ! git diff --quiet -- lib/main.dart pubspec.yaml test/widget_test.dart; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/main.dart pubspec.yaml test/widget_test.dart
            git commit -m "Simplify goals and expand action duration"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply safe Dart fixes
        run: dart fix --apply

      - name: Format source
        run: dart format lib/main.dart test/widget_test.dart

      - name: Commit analysis fixes
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if ! git diff --quiet -- lib/main.dart test/widget_test.dart; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/main.dart test/widget_test.dart
            git commit -m "Clean Dart analysis"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Generate Android platform files
        shell: bash
        run: |
          cp lib/main.dart /tmp/vmeste_main.dart
          flutter create . \
            --platforms=android \
            --project-name=vmeste_goal \
            --org=com.vmeste
          cp /tmp/vmeste_main.dart lib/main.dart

      - name: Configure Android notifications
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest_path = Path('android/app/src/main/AndroidManifest.xml')
          manifest = manifest_path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = '''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />'''
          if 'android.permission.POST_NOTIFICATIONS' not in manifest:
              manifest = manifest.replace(marker, permissions, 1)

          receivers = '''
                  <receiver
                      android:exported="false"
                      android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />
                  <receiver
                      android:exported="false"
                      android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.MY_PACKAGE_REPLACED" />
                          <action android:name="android.intent.action.QUICKBOOT_POWERON" />
                          <action android:name="com.htc.intent.action.QUICKBOOT_POWERON" />
                      </intent-filter>
                  </receiver>
          '''
          if 'ScheduledNotificationReceiver' not in manifest:
              manifest = manifest.replace('</application>', receivers + '\n    </application>', 1)
          manifest_path.write_text(manifest)

          gradle_path = Path('android/app/build.gradle.kts')
          gradle = gradle_path.read_text()
          if 'isCoreLibraryDesugaringEnabled = true' not in gradle:
              gradle = gradle.replace(
                  'compileOptions {',
                  'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
                  1,
              )
          if 'coreLibraryDesugaring(' not in gradle:
              gradle += '''

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")
          }
          '''
          gradle_path.write_text(gradle)
          PY

      - name: Add speech recognition permissions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          block = '''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <queries>
                  <intent>
                      <action android:name="android.speech.RecognitionService" />
                  </intent>
              </queries>'''
          if marker in text:
              text = text.replace(marker, block, 1)
          path.write_text(text)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build-apk.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.4.1-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.4.1-build-log
          path: |
            analyze.log
            test.log
            build-apk.log
          if-no-files-found: warn
          retention-days: 7
