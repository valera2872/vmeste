name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Normalize goal card source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/main.dart')
          lines = path.read_text().splitlines()
          replacement = '''class GoalHero extends StatelessWidget {
            const GoalHero({required this.app, super.key});
            final AppState app;

            @override
            Widget build(BuildContext context) {
              final g = app.goal!;
              return Container(
                padding: const EdgeInsets.all(22),
                decoration: BoxDecoration(
                  gradient: const LinearGradient(colors: [ink, Color(0xFF315F57)]),
                  borderRadius: BorderRadius.circular(28),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    const Text('МОЯ ГЛАВНАЯ ЦЕЛЬ', style: TextStyle(color: mint, fontSize: 12, fontWeight: FontWeight.w900, letterSpacing: 1.1)),
                    const SizedBox(height: 12),
                    Text(g.title, style: const TextStyle(color: Colors.white, fontSize: 25, height: 1.15, fontWeight: FontWeight.w900)),
                    if (g.result.isNotEmpty) ...[
                      const SizedBox(height: 8),
                      Text(g.result, style: const TextStyle(color: Color(0xFFD4E0DD))),
                    ],
                    const SizedBox(height: 16),
                    Row(
                      children: [
                        _metric('${app.goalDone}', 'действий'),
                        const SizedBox(width: 9),
                        _metric('${g.minutes} мин', 'обычный блок'),
                        const SizedBox(width: 9),
                        _metric('${g.areas.length}', 'направлений'),
                      ],
                    ),
                  ],
                ),
              );
            }

            Widget _metric(String value, String label) => Expanded(
              child: Container(
                padding: const EdgeInsets.symmetric(vertical: 11, horizontal: 5),
                decoration: BoxDecoration(color: Colors.white10, borderRadius: BorderRadius.circular(15)),
                child: Column(
                  children: [
                    Text(value, style: const TextStyle(color: Colors.white, fontSize: 16, fontWeight: FontWeight.w900)),
                    Text(label, textAlign: TextAlign.center, style: const TextStyle(color: Colors.white60, fontSize: 11)),
                  ],
                ),
              ),
            );
          }'''.splitlines()
          for i, line in enumerate(lines):
              if line.startswith('class GoalHero extends StatelessWidget'):
                  lines[i:i+1] = replacement
                  break
          else:
              raise SystemExit('GoalHero source marker not found')
          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit normalized source
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/v0-2-goal-architecture'
        shell: bash
        run: |
          if ! git diff --quiet -- lib/main.dart; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/main.dart
            git commit -m "Fix goal card compilation"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format source
        run: dart format lib/main.dart

      - name: Generate Android platform files
        shell: bash
        run: |
          cp lib/main.dart /tmp/vmeste_main.dart
          flutter create . \
            --platforms=android \
            --project-name=vmeste_goal \
            --org=com.vmeste
          cp /tmp/vmeste_main.dart lib/main.dart

      - name: Add speech recognition permissions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text()
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          block = '''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <queries>
                  <intent>
                      <action android:name="android.speech.RecognitionService" />
                  </intent>
              </queries>'''
          if marker in text:
              text = text.replace(marker, block, 1)
          path.write_text(text)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build-apk.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.2-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmeste-goal-v0.2-build-log
          path: build-apk.log
          if-no-files-found: warn
          retention-days: 7
